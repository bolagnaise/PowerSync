name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.5.0"
      - name: Ruff check
        run: ruff check custom_components/power_sync --output-format=github
        continue-on-error: true
      - name: Ruff format check
        run: ruff format --check custom_components/power_sync
        continue-on-error: true

  syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile all .py files
        run: |
          python -m compileall -q custom_components/power_sync

  manifest:
    name: Manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest.json
        run: |
          python -c "import json; m=json.load(open('custom_components/power_sync/manifest.json')); assert 'domain' in m and 'version' in m and 'requirements' in m, 'manifest missing required keys'; print('manifest ok:', m['domain'], m['version'])"

  yaml:
    name: YAML syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Check services.yaml
        run: |
          python -c "import yaml; yaml.safe_load(open('custom_components/power_sync/services.yaml'))"
