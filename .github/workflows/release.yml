name: Create Release on Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'custom_components/power_sync/manifest.json'

permissions:
  contents: write

jobs:
  release:
    # Only run on the upstream repo — forks don't have the DISCORD_WEBHOOK
    # secret and the release isn't meant to announce fork versions anyway.
    if: github.repository == 'bolagnaise/PowerSync'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/power_sync/manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        if: steps.check_tag.outputs.exists == 'false'
        id: notes
        run: |
          # Prefer RELEASE_NOTES.md committed alongside the version bump.
          # This is the canonical source — fall back to commit-log generation
          # only when the file is missing or empty.
          if [ -s RELEASE_NOTES.md ]; then
            cp RELEASE_NOTES.md /tmp/release_notes.md
            echo "Using RELEASE_NOTES.md from repository"
          else
            echo "RELEASE_NOTES.md missing or empty — generating from commits"
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              RANGE="$PREV_TAG..HEAD"
            else
              RANGE="HEAD~20..HEAD"
            fi
            echo "## What's Changed" > /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
            git log --pretty=format:"### %s%n%n%b%n---" "$RANGE" -- custom_components/ \
              | grep -v "^### Bump version" \
              | grep -v "^---$" \
              | sed '/^$/N;/^\n$/d' >> /tmp/release_notes.md
          fi

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "v$VERSION" \
            --notes-file /tmp/release_notes.md
          echo "Created release v$VERSION"

      # NOTE: a separate workflow listening on `release: published` would NOT
      # fire here, because GitHub Actions intentionally suppresses downstream
      # workflows for events triggered by GITHUB_TOKEN. Posting to Discord
      # directly in this job is the only reliable path.
      #
      # We build the JSON payload in Python (safe escaping of release notes)
      # and post it via curl. urllib's default User-Agent is blocked by
      # Discord's webhook spam filter (returns 403), so curl is required.
      - name: Notify Discord
        if: steps.check_tag.outputs.exists == 'false'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PYEOF' > /tmp/discord_payload.json
          import json, os

          with open('/tmp/release_notes.md', 'r') as f:
              notes = f.read().strip()
          if len(notes) > 4000:
              notes = notes[:3997] + '...'

          version = os.environ['VERSION']
          payload = {
              'embeds': [{
                  'title': f'🚀 PowerSync v{version} Released',
                  'description': notes,
                  'color': 5025616,
                  'url': f'https://github.com/bolagnaise/PowerSync/releases/tag/{version}',
                  'footer': {'text': 'Update available via HACS'},
              }]
          }
          print(json.dumps(payload))
          PYEOF

          HTTP_CODE=$(curl -s -o /tmp/discord_response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/discord_payload.json \
            "$DISCORD_WEBHOOK")

          echo "Discord webhook HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Discord webhook failed:"
            cat /tmp/discord_response.txt
            exit 1
          fi
          echo "Discord notified for v$VERSION"
