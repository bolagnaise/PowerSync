name: Create Release on Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'custom_components/power_sync/manifest.json'

permissions:
  contents: write

jobs:
  release:
    # Only run on the upstream repo — forks don't have the DISCORD_WEBHOOK
    # secret and the release isn't meant to announce fork versions anyway.
    if: github.repository == 'bolagnaise/PowerSync'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/power_sync/manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Check both v-prefixed and bare tags to avoid duplicates
          if git rev-parse "v$VERSION" >/dev/null 2>&1 || git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION or $VERSION already exists — skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        if: steps.check_tag.outputs.exists == 'false'
        id: notes
        run: |
          # Prefer a hand-written RELEASE_NOTES.md if it exists (for
          # feature releases with user-friendly descriptions). Fall back
          # to auto-generating from commit messages for patch releases.
          if [ -f "RELEASE_NOTES.md" ] && [ -s "RELEASE_NOTES.md" ]; then
            echo "Using hand-written RELEASE_NOTES.md"
            cp RELEASE_NOTES.md /tmp/release_notes.md
          else
            echo "No RELEASE_NOTES.md found, generating from commits"
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              RANGE="$PREV_TAG..HEAD"
              echo "Generating notes from $RANGE"
            else
              RANGE="HEAD~20..HEAD"
              echo "No previous tag found, using last 20 commits"
            fi

            echo "## What's Changed" > /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md

            git log --pretty=format:"### %s%n%n%b" "$RANGE" -- custom_components/ \
              | grep -v "^### Bump version" \
              | grep -v "^### docs(release)" \
              | grep -v "^### chore(manifest)" \
              | sed '/^$/N;/^\n$/d' >> /tmp/release_notes.md

            echo "" >> /tmp/release_notes.md
            echo "Update available via HACS" >> /tmp/release_notes.md
          fi

          echo "--- Release notes ---"
          head -30 /tmp/release_notes.md

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" \
            --title "PowerSync v$VERSION" \
            --notes-file /tmp/release_notes.md
          echo "Created release v$VERSION"

      - name: Clear RELEASE_NOTES.md after use
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Prevent stale hand-written notes from being reused on the
          # next version bump. Truncate the file and commit it back so
          # future releases fall through to auto-generated commit notes.
          if [ -f "RELEASE_NOTES.md" ] && [ -s "RELEASE_NOTES.md" ]; then
            echo -n "" > RELEASE_NOTES.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add RELEASE_NOTES.md
            git commit -m "docs(release): clear RELEASE_NOTES.md after v${{ steps.version.outputs.version }}"
            git push origin main
            echo "Cleared RELEASE_NOTES.md"
          fi

      # NOTE: a separate workflow listening on `release: published` would NOT
      # fire here, because GitHub Actions intentionally suppresses downstream
      # workflows for events triggered by GITHUB_TOKEN. Posting to Discord
      # directly in this job is the only reliable path.
      #
      # We build the JSON payload in Python (safe escaping of release notes)
      # and post it via curl. urllib's default User-Agent is blocked by
      # Discord's webhook spam filter (returns 403), so curl is required.
      - name: Notify Discord
        if: steps.check_tag.outputs.exists == 'false'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PYEOF' > /tmp/discord_payload.json
          import json, os

          with open('/tmp/release_notes.md', 'r') as f:
              notes = f.read().strip()
          if len(notes) > 4000:
              notes = notes[:3997] + '...'

          version = os.environ['VERSION']
          payload = {
              'embeds': [{
                  'title': f'🚀 PowerSync v{version} Released',
                  'description': notes,
                  'color': 5025616,
                  'url': f'https://github.com/bolagnaise/PowerSync/releases/tag/v{version}',
                  'footer': {'text': 'Update available via HACS'},
              }]
          }
          print(json.dumps(payload))
          PYEOF

          HTTP_CODE=$(curl -s -o /tmp/discord_response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/discord_payload.json \
            "$DISCORD_WEBHOOK")

          echo "Discord webhook HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Discord webhook failed:"
            cat /tmp/discord_response.txt
            exit 1
          fi
          echo "Discord notified for v$VERSION"
