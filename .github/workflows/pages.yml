name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # Only run on the upstream repo — forks don't have GitHub Pages enabled
    # and fail on actions/configure-pages with "Get Pages site failed".
    if: github.repository == 'bolagnaise/PowerSync'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v5
