name: Python CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  lint:
    name: Ruff + MyPy + Bandit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt ruff mypy bandit
      - run: ruff check .
      - run: mypy . --ignore-missing-imports
      - run: bandit -r . -ll -x ./tests

  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt pytest pytest-cov
      - run: pytest --tb=short -q --cov=. --cov-report=xml
        env:
          FLASK_ENV: testing
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
