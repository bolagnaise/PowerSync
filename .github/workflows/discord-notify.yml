name: Discord Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord of new release
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          script: |
            const release = context.payload.release;
            let body = release.body || 'No release notes.';

            // Discord embed description limit is 4096 chars
            if (body.length > 4000) {
              body = body.substring(0, 3997) + '...';
            }

            const payload = {
              embeds: [{
                title: `🚀 PowerSync ${release.tag_name} Released`,
                description: body,
                color: 5025616,
                url: release.html_url,
                footer: { text: 'Update available via HACS' }
              }]
            };

            await fetch(process.env.DISCORD_WEBHOOK, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            console.log(`Discord notified for ${release.tag_name}`);
