name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    name: Claude Code Assistant
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       !contains(github.event.comment.body, '@claude review') &&
       (github.event.comment.author_association != 'NONE' || github.event.comment.user.login == 'coderabbitai[bot]')) ||
      (github.event_name == 'pull_request_review_comment' &&
       (
         (contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude review')) ||
         (github.event.comment.user.login == 'coderabbitai[bot]' && (contains(github.event.comment.body, 'Potential issue') || contains(github.event.comment.body, 'Security issue') || contains(github.event.comment.body, 'Suggestion') || contains(github.event.comment.body, 'Nitpick')))
       ) &&
       (github.event.comment.author_association != 'NONE' || github.event.comment.user.login == 'coderabbitai[bot]')) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude') &&
       (github.event.review.author_association != 'NONE' || github.event.review.user.login == 'coderabbitai[bot]')) ||
      (github.event_name == 'issues' &&
       contains(github.event.issue.body, '@claude') &&
       github.event.issue.author_association != 'NONE')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect CodeRabbit trigger and severity
        id: cr_detect
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_SENDER: ${{ github.event.comment.user.login }}
        run: |
          IS_CR_BOT="false"
          CR_SEVERITY=""
          CR_SUMMARY=""
          ACTION="human"

          if [ "$COMMENT_SENDER" = "coderabbitai[bot]" ]; then
            IS_CR_BOT="true"

            # Detect severity from CodeRabbit's native markers (safely via env var)
            if echo "$COMMENT_BODY" | grep -qE "Critical|🔴"; then
              CR_SEVERITY="critical"
              ACTION="fix"
            elif echo "$COMMENT_BODY" | grep -qE "Major|🟠"; then
              CR_SEVERITY="major"
              ACTION="fix"
            elif echo "$COMMENT_BODY" | grep -qE "Minor|🟡"; then
              CR_SEVERITY="minor"
              ACTION="fix"
            elif echo "$COMMENT_BODY" | grep -qE "Suggestion|💡|Nitpick|nitpick"; then
              CR_SEVERITY="nitpick"
              ACTION="issue"
            fi

            # Extract summary from the bold title line
            CR_SUMMARY=$(echo "$COMMENT_BODY" | grep -oP '\*\*(.+?)\*\*' | head -1 | sed 's/\*\*//g')
          fi

          echo "is_cr_bot=$IS_CR_BOT" >> $GITHUB_OUTPUT
          echo "cr_severity=$CR_SEVERITY" >> $GITHUB_OUTPUT
          echo "cr_summary=$CR_SUMMARY" >> $GITHUB_OUTPUT
          echo "action=$ACTION" >> $GITHUB_OUTPUT

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 10
          custom_instructions: |
            You are operating on PowerSync, a Home Assistant custom integration for
            battery optimization and energy management. Python only.

            COMMIT FORMAT: {type}({scope}): {description}
            Valid types only: feat, fix, test, refactor, perf, docs, style, chore

            BRANCH RULES:
            - Never commit directly to main
            - Branch naming: {type}/{description}-{issue-number}

            CODE STANDARDS (Python/HA):
            - Type hints on all public functions
            - No bare except: — always catch specific exceptions
            - No secrets in code or logs
            - Proper async/await — no blocking calls in async methods
            - Correct HA patterns (DataUpdateCoordinator, config flow, platform entities)

            CRITICAL FILES (battery charging/discharging/pricing logic):
            coordinator.py, __init__.py, optimization/coordinator.py, executor.py,
            schedule_reader.py — extra care required, minimal changes only.

            SECRETS: Never commit .env, tokens, API keys, or credentials.

            PR RULES:
            - Always open as draft first
            - Never auto-merge
            - Small focused changes only — one logical change per PR

            CODERABBIT AUTO-FIX HANDLING:

            IS_CR_BOT: ${{ steps.cr_detect.outputs.is_cr_bot }}
            CR_SEVERITY: ${{ steps.cr_detect.outputs.cr_severity }}
            CR_SUMMARY: ${{ steps.cr_detect.outputs.cr_summary }}
            ACTION: ${{ steps.cr_detect.outputs.action }}

            IF IS_CR_BOT is true AND ACTION is fix:
            1. Read the CodeRabbit comment fully — understand the finding AND proposed fix
            2. ALWAYS attempt to fix the issue, even if:
               - The comment is marked "outside diff range" — fix the file anyway
               - The current PR partially addresses it — improve the fix
               - The finding spans multiple files — fix all affected files
            3. Locate the exact file and line. Read surrounding context to understand the code.
            4. Write the fix. Keep it minimal but complete — address the root cause.
            5. Run: ruff check . and mypy . --ignore-missing-imports
            6. Commit: fix({scope}): {cr_summary}
            7. Push to PR branch — never to main
            8. Reply to the CodeRabbit comment: Fixed in [SHA]. [One sentence describing change.]
            9. Stop — do not open new PRs

            IF you cannot fix it (e.g., requires architectural change or user decision):
            1. Reply explaining WHY you can't fix it and what the user should do
            2. Create a GitHub issue tracking the work needed
            3. Stop

            IF IS_CR_BOT is true AND ACTION is issue (nitpick):
            1. Do NOT make code changes
            2. Create GitHub issue (title: style:, labels: style,coderabbit-nitpick)
            3. Reply: Tracked in issue #[N]. Not fixing inline.
            4. Stop

            HUMAN TRIGGER (IS_CR_BOT is false):
            1. Analyse, create branch, implement, run ruff+mypy
            2. Open draft PR linked to issue
            3. Stop — do not merge
