# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
tone_instructions: "Be direct and specific. No filler. Flag real issues only."
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_instructions: >
    Summarise changes as a bullet list. Include: what changed, why, and any
    breaking changes. Add a table of files changed with lines added/removed.
  poem: false
  review_status: true
  review_details: true
  collapse_walkthrough: false
  sequence_diagrams: true
  changed_files_summary: true

  finishing_touches:
    docstrings:
      enabled: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "develop"

  path_filters:
    - "!**/node_modules/**"
    - "!**/.next/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/*.lock"
    - "!**/Pods/**"
    - "!**/.build/**"
    - "!**/__pycache__/**"
    - "!**/migrations/**"
    - "!**/*.min.js"
    - "!**/coverage/**"

  # ── @claude trigger instructions per severity ─────────────────────────────
  # CodeRabbit will append a trigger comment to each finding so the
  # claude-assistant workflow can detect and act on it automatically.
  # The workflow watches for coderabbitai[bot] comments containing @claude.
  review_comment_instructions: >
    After every finding you post, append a trigger line based on severity:

    For CRITICAL findings (security vulnerabilities, data loss risk, crash bugs):
    End your comment with exactly:
    `@claude fix: critical — [one line summary of the issue]`

    For MAJOR findings (logic errors, incorrect API usage, missing error handling,
    broken stack rules, AEST date bug, force unwrap without justification,
    bare except:, missing type hints on public functions):
    End your comment with exactly:
    `@claude fix: major — [one line summary of the issue]`

    For MINOR findings (code quality, naming, documentation gaps, style):
    End your comment with exactly:
    `@claude fix: minor — [one line summary of the issue]`

    For NITPICK findings (purely preference-level, cosmetic):
    End your comment with exactly:
    `@claude issue: nitpick — [one line summary of the issue]`

    Important: nitpick findings should create a GitHub issue, NOT fix inline.
    All other severities should attempt an inline fix on the PR branch.

  path_instructions:
    # — Next.js / TypeScript —
    - path: "**/*.ts"
      instructions: >
        Check for: strict TypeScript (no `any`), correct Prisma usage, proper
        Next.js 14 App Router patterns, server vs client component boundaries,
        missing error boundaries, unhandled promise rejections.
    - path: "**/*.tsx"
      instructions: >
        Verify: no client components importing server-only modules, correct use
        of Suspense and loading.tsx, accessibility (aria labels, semantic HTML),
        no hardcoded colours outside the design token system.
    - path: "**/api/**"
      instructions: >
        Every route MUST have: input validation, error handling, correct HTTP
        status codes, no exposed secrets or PII in responses.
    - path: "**/prisma/**"
      instructions: >
        Check migrations are additive (no destructive schema changes without
        explicit comment), indexes on foreign keys, no raw SQL without
        parameterisation.
    # — Swift / SwiftUI —
    - path: "**/*.swift"
      instructions: >
        Check for: Swift concurrency correctness (no data races, correct actor
        isolation), memory leaks (weak self in closures), SwiftUI view
        efficiency (no unnecessary redraws), proper error handling with
        Result/throws, no force unwraps without a comment justifying them.
    - path: "**/Services/**"
      instructions: >
        Verify actor isolation, correct async/await usage, no blocking main
        thread operations, proper cancellation handling.
    # — Python / Flask —
    - path: "**/*.py"
      instructions: >
        Check for: type hints on all public functions, no bare `except:`,
        SQL injection risks, missing input sanitisation, secrets not in code,
        Flask Blueprint structure respected, APScheduler job error handling.
    - path: "**/templates/**"
      instructions: >
        Verify Jinja2 templates escape user input, no XSS vectors, correct
        use of url_for().
    # — GitHub Actions —
    - path: ".github/workflows/**"
      instructions: >
        Check: no hardcoded secrets (use ${{ secrets.X }}), pinned action
        versions (SHA preferred), no `pull_request_target` misuse, correct
        permissions blocks, jobs have timeout-minutes set.
    # — Documentation —
    - path: "**/*.md"
      instructions: >
        Verify: no broken links, code examples match actual implementation,
        version numbers are current, no TODO left unfixed.
    - path: "**/CHANGELOG.md"
      instructions: >
        Entries MUST follow Keep a Changelog format. New version section MUST
        be present for this PR's changes.

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
      - "docs/CONTRIBUTING.md"
      - "docs/ARCHITECTURE.md"
  learnings:
    scope: auto
