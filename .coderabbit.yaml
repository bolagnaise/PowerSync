# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
tone_instructions: "Be direct and specific. No filler. Flag real issues only."
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_instructions: >
    Summarise changes as a bullet list. Include: what changed, why, and any
    breaking changes. Add a table of files changed with lines added/removed.
  poem: false
  review_status: true
  review_details: true
  collapse_walkthrough: false
  sequence_diagrams: true
  changed_files_summary: true

  auto_review:
    enabled: true
    drafts: true
    base_branches:
      - "main"

  path_filters:
    - "!**/__pycache__/**"
    - "!**/*.pyc"
    - "!**/node_modules/**"
    - "!**/.build/**"

  review_comment_instructions: >
    After every finding you post, append a trigger line based on severity:

    For CRITICAL findings (security vulnerabilities, data loss risk, crash bugs):
    End your comment with exactly:
    `@claude fix: critical — [one line summary of the issue]`

    For MAJOR findings (logic errors, incorrect API usage, missing error handling,
    bare except:, missing type hints on public functions, battery/pricing logic bugs):
    End your comment with exactly:
    `@claude fix: major — [one line summary of the issue]`

    For MINOR findings (code quality, naming, documentation gaps, style):
    End your comment with exactly:
    `@claude fix: minor — [one line summary of the issue]`

    For NITPICK findings (purely preference-level, cosmetic):
    End your comment with exactly:
    `@claude issue: nitpick — [one line summary of the issue]`

    Important: nitpick findings should create a GitHub issue, NOT fix inline.
    All other severities should attempt an inline fix on the PR branch.

  path_instructions:
    # — Core integration (highest risk) —
    - path: "custom_components/power_sync/__init__.py"
      instructions: >
        Entry point for the integration. Check: correct async_setup_entry flow,
        proper coordinator initialization, no blocking calls, correct platform
        forwarding, clean async_unload_entry cleanup.

    - path: "custom_components/power_sync/coordinator.py"
      instructions: >
        Main data coordinator. CRITICAL FILE — controls battery charging,
        discharging, and pricing decisions for every user. Check: correct
        DataUpdateCoordinator usage, proper error handling in _async_update_data,
        no stale data on failure, correct update intervals, thread safety.

    - path: "custom_components/power_sync/config_flow.py"
      instructions: >
        Config and options flow. Check: correct HA config flow patterns, proper
        validation, user-friendly error messages, correct use of HA selectors,
        no secrets logged or exposed in flow steps.

    - path: "custom_components/power_sync/const.py"
      instructions: >
        Constants and configuration keys. Check: no magic strings elsewhere that
        should be constants here, consistent naming conventions, no stale or
        unused constants.

    # — Optimization (high risk) —
    - path: "custom_components/power_sync/optimization/**"
      instructions: >
        Battery optimization and LP solver. CRITICAL — incorrect logic here
        causes financial loss (wrong charge/discharge decisions). Check:
        correct mathematical constraints, proper handling of edge cases
        (zero solar, grid outage, negative prices), correct unit conversions
        ($/kWh vs c/kWh), no silent failures.

    # — Inverter controllers —
    - path: "custom_components/power_sync/*_api.py"
      instructions: >
        Inverter and energy provider API clients. Check: correct async HTTP
        usage, proper timeout handling, correct authentication flows, no
        secrets in logs, graceful degradation on API failures, correct
        data parsing and unit handling.

    # — HA platform entities —
    - path: "custom_components/power_sync/sensor.py"
      instructions: >
        Sensor entities. Check: correct state_class and device_class, proper
        native_unit_of_measurement, no blocking in async methods, correct
        coordinator data access patterns.

    - path: "custom_components/power_sync/switch.py"
      instructions: >
        Switch entities. Check: correct async_turn_on/off implementation,
        proper optimistic state handling, no race conditions with coordinator.

    - path: "custom_components/power_sync/select.py"
      instructions: >
        Select entities. Check: correct option validation, proper async
        handling, coordinator state consistency.

    - path: "custom_components/power_sync/number.py"
      instructions: >
        Number entities. Check: correct min/max/step validation, proper
        native_value handling, unit consistency.

    - path: "custom_components/power_sync/binary_sensor.py"
      instructions: >
        Binary sensor entities. Check: correct is_on logic, proper
        device_class usage, coordinator data access.

    # — Python general —
    - path: "**/*.py"
      instructions: >
        Check for: type hints on all public functions, no bare `except:`,
        no secrets in code, proper async/await usage (no blocking calls),
        correct logging levels, no force-formatting changes outside the
        scope of the PR.

    # — GitHub Actions —
    - path: ".github/workflows/**"
      instructions: >
        Check: no hardcoded secrets (use ${{ secrets.X }}), pinned action
        versions, correct permissions blocks, jobs have timeout-minutes.

    # — Documentation —
    - path: "**/*.md"
      instructions: >
        Verify: no broken links, code examples match actual implementation,
        version numbers are current.

    - path: "**/CHANGELOG.md"
      instructions: >
        Entries MUST follow Keep a Changelog format.

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
  learnings:
    scope: auto
