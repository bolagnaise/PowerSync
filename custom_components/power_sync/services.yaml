# Services for PowerSync integration
sync_tou_schedule:
  name: Sync TOU Schedule
  description: Manually refresh Time-of-Use tariff prices. Tesla systems upload the schedule; Modbus systems store it for PowerSync display and optimization.
  fields: {}

sync_now:
  name: Sync Now
  description: Immediately refresh data from Amber and Tesla
  fields: {}

force_discharge:
  name: Force Discharge
  description: Force battery discharge mode - switches to autonomous with high export tariff to maximise export
  fields:
    duration:
      name: Duration
      description: Duration in minutes (15 minutes to 4 hours)
      required: false
      default: 30
      example: 60
      selector:
        select:
          options:
            - label: "15 minutes"
              value: "15"
            - label: "30 minutes"
              value: "30"
            - label: "45 minutes"
              value: "45"
            - label: "1 hour"
              value: "60"
            - label: "1 hour 15 min"
              value: "75"
            - label: "1 hour 30 min"
              value: "90"
            - label: "1 hour 45 min"
              value: "105"
            - label: "2 hours"
              value: "120"
            - label: "2 hours 15 min"
              value: "135"
            - label: "2 hours 30 min"
              value: "150"
            - label: "2 hours 45 min"
              value: "165"
            - label: "3 hours"
              value: "180"
            - label: "3 hours 15 min"
              value: "195"
            - label: "3 hours 30 min"
              value: "210"
            - label: "3 hours 45 min"
              value: "225"
            - label: "4 hours"
              value: "240"
    power_w:
      name: Power (W)
      description: Target power in watts. 0 or omitted means use the inverter's rated/BMS max.
      required: false
      default: 0
      example: 5000
      selector:
        number:
          min: 0
          max: 50000
          step: 500
          unit_of_measurement: W

force_charge:
  name: Force Charge
  description: Force battery charge mode - switches to autonomous with free import tariff to maximise charging from grid
  fields:
    duration:
      name: Duration
      description: Duration in minutes (15 minutes to 4 hours)
      required: false
      default: 30
      example: 60
      selector:
        select:
          options:
            - label: "15 minutes"
              value: "15"
            - label: "30 minutes"
              value: "30"
            - label: "45 minutes"
              value: "45"
            - label: "1 hour"
              value: "60"
            - label: "1 hour 15 min"
              value: "75"
            - label: "1 hour 30 min"
              value: "90"
            - label: "1 hour 45 min"
              value: "105"
            - label: "2 hours"
              value: "120"
            - label: "2 hours 15 min"
              value: "135"
            - label: "2 hours 30 min"
              value: "150"
            - label: "2 hours 45 min"
              value: "165"
            - label: "3 hours"
              value: "180"
            - label: "3 hours 15 min"
              value: "195"
            - label: "3 hours 30 min"
              value: "210"
            - label: "3 hours 45 min"
              value: "225"
            - label: "4 hours"
              value: "240"
    power_w:
      name: Power (W)
      description: Target power in watts. 0 or omitted means use the inverter's rated/BMS max.
      required: false
      default: 0
      example: 5000
      selector:
        number:
          min: 0
          max: 50000
          step: 500
          unit_of_measurement: W

restore_normal:
  name: Restore Normal
  description: Restore normal operation - restores saved tariff or triggers Amber sync for Amber users
  fields: {}

set_self_consumption:
  name: Set Self Consumption
  description: Set battery to pure self-consumption mode (battery offsets home load, no TOU optimization)
  fields: {}

set_backup_reserve:
  name: Set Backup Reserve
  description: Set the battery backup reserve percentage (0-100%). Supports both Tesla Powerwall and SigEnergy systems.
  fields:
    percent:
      name: Percent
      description: Backup reserve percentage
      required: true
      example: 20
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"

set_operation_mode:
  name: Set Operation Mode
  description: Set Powerwall operation mode (Time-Based Control, Self-Consumption, or Backup-Only)
  fields:
    mode:
      name: Mode
      description: Operation mode
      required: true
      example: "autonomous"
      selector:
        select:
          options:
            - label: "Time-Based Control (TOU)"
              value: "autonomous"
            - label: "Self-Consumption"
              value: "self_consumption"
            - label: "Backup-Only"
              value: "backup"

set_grid_export:
  name: Set Grid Export
  description: Set grid export rule (controls when battery can export to grid)
  fields:
    rule:
      name: Export Rule
      description: Grid export rule
      required: true
      example: "pv_only"
      selector:
        select:
          options:
            - label: "Never"
              value: "never"
            - label: "Solar Only"
              value: "pv_only"
            - label: "Solar + Battery"
              value: "battery_ok"

set_grid_charging:
  name: Set Grid Charging
  description: Enable or disable grid charging (allow battery to charge from grid)
  fields:
    enabled:
      name: Enabled
      description: Enable grid charging
      required: true
      example: true
      selector:
        boolean:

set_storm_watch:
  name: Set Storm Watch
  description: Enable or disable Tesla Storm Watch (predictive pre-charging before severe weather). Only applicable to energy sites that support storm mode.
  fields:
    enabled:
      name: Enabled
      description: Enable Storm Watch
      required: true
      example: true
      selector:
        boolean:

set_off_grid_ev_reserve:
  name: Set Off-Grid EV Charging Reserve
  description: Set the percentage of battery capacity reserved for vehicle charging during a grid outage.
  fields:
    percent:
      name: Reserve Percent
      description: Percentage of battery capacity held for EV charging when off-grid (0-100)
      required: true
      example: 20
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"

set_vpp_enrollment:
  name: Set VPP Program Enrollment
  description: Enroll or unenroll the Powerwall in a Tesla Virtual Power Plant / grid services program. Program availability is region-dependent.
  fields:
    program_id:
      name: Program ID
      description: Tesla program identifier (fetched from the site's programs list)
      required: true
      example: "tesla_electric"
      selector:
        text:
    enrolled:
      name: Enrolled
      description: True to enroll in the program, False to unenroll
      required: true
      example: true
      selector:
        boolean:

get_calendar_history:
  name: Get Calendar History
  description: Fetch energy history from the configured battery system for mobile app energy summaries
  fields:
    period:
      name: Period
      description: Time period for history (day, week, month, year)
      required: false
      default: "day"
      example: "week"
      selector:
        select:
          options:
            - label: "Day"
              value: "day"
            - label: "Week"
              value: "week"
            - label: "Month"
              value: "month"
            - label: "Year"
              value: "year"

sync_battery_health:
  name: Sync Battery Health
  description: Receive battery health data from mobile app TEDAPI scan and update sensors
  fields:
    original_capacity_wh:
      name: Original Capacity (Wh)
      description: Original battery capacity in Wh when new
      required: true
      example: 40500
      selector:
        number:
          min: 0
          max: 500000
          unit_of_measurement: Wh
    current_capacity_wh:
      name: Current Capacity (Wh)
      description: Current battery capacity in Wh
      required: true
      example: 38475
      selector:
        number:
          min: 0
          max: 500000
          unit_of_measurement: Wh
    degradation_percent:
      name: Degradation Percent
      description: Battery degradation percentage
      required: true
      example: 5.0
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          unit_of_measurement: "%"
    battery_count:
      name: Battery Count
      description: Number of Powerwall units
      required: false
      default: 1
      example: 2
      selector:
        number:
          min: 1
          max: 20
    scanned_at:
      name: Scanned At
      description: ISO timestamp of when the scan was performed
      required: false
      example: "2024-12-23T10:30:00Z"
      selector:
        text:

powerwall_go_off_grid:
  name: Go Off-Grid (Local)
  description: >-
    Disconnect the Tesla Powerwall from the grid using direct local control.
    Requires the gateway to be paired via the mobile app's Battery Setup
    section. Refuses to run when battery SOC is below the configured safety
    floor (default 20%) unless bypass_soc_check is explicitly set. Works on
    Powerwall 2 (REST) and Powerwall 3 (TEDAPI v1r).
  fields:
    bypass_soc_check:
      name: Bypass SOC Safety Check
      description: >-
        Override the minimum-SOC refusal. Only use this if you know exactly
        what you're doing — you can strand your house on an empty battery.
      required: false
      default: false
      selector:
        boolean:

powerwall_reconnect_grid:
  name: Reconnect to Grid (Local)
  description: >-
    Reconnect the Tesla Powerwall to the grid after an intentional islanding.
    Works on paired Powerwall 2 (REST) and Powerwall 3 (TEDAPI v1r). Safe to
    call while already on-grid — the gateway will no-op.
  fields: {}

schedule_max_backup:
  name: Schedule Max Backup
  description: >-
    Charge the Powerwall to 100% for a fixed window then restore the previous
    backup reserve. Use ahead of forecast outages or storms. Calling again while
    a window is active replaces the schedule and preserves the original reserve.
  fields:
    duration_minutes:
      name: Duration (minutes)
      description: How long to hold the reserve at 100% before restoring (1-1440).
      required: true
      example: 120
      selector:
        number:
          min: 1
          max: 1440
          step: 1
          unit_of_measurement: min
          mode: box

refresh_calibration:
  name: Refresh Calibration
  description: >-
    Clear PowerSync's calibration_suspected flag. Use after a Powerwall
    calibration cycle completes if the optimiser hasn't auto-cleared the flag,
    or to retry mode toggles immediately. Doesn't touch the Powerwall — purely
    resets the integration's local guard.
  fields: {}
